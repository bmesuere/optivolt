name: Optivolt
slug: optivolt
version: "0.2.0"
description: Plan and control Victron ESS with forecasts & dynamic tariffs!
url: https://github.com/bmesuere/optivolt
arch:
  - aarch64
  - amd64
startup: application
init: false

# Ingress lets the UI appear inside Home Assistant without opening a port.
ingress: true
ingress_port: 3000
panel_title: Optivolt
panel_icon: mdi:home-battery-outline
homeassistant_api: true

ports:
  "3000/tcp": 3070
ports_description:
  "3000/tcp": Direct API access (use ingress for UI)

# Persist add-on state in /data
map:
  - data:rw

options:
  site_id: ""
  vrm_token: ""
  mqtt_host: "venus.local"
  # use 8883 for tls
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_tls: false # consider setting to true
  mqtt_tls_insecure: true # don't fail on invalid certs
  # specify the tls fingerprint of the host, this is a good fallback if you skip cert validation.
  # you can get the fingerprint with
  #   openssl s_client -connect <cerbo-ip>:8883 < /dev/null 2>/dev/null \
  #   | openssl x509 -fingerprint -sha256 -noout
  mqtt_tls_fingerprint: ""

schema:
  site_id: str
  vrm_token: password
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: password
  mqtt_tls: bool
  mqtt_tls_insecure: bool
  mqtt_tls_fingerprint: str
